<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Live Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  text-align: center;
}

/* container */
.container {
  padding: 50px 18px;
  max-width: 480px;
  margin: auto;
}

/* live badge */
.badge {
  display: inline-block;
  background: #ff007a;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  margin-bottom: 15px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.sub {
  font-size: 16px;
  color: #cccccc;
  margin-bottom: 20px;
}

/* preview */
.preview {
  width: 100%;
  height: 260px;
  background: url("https://github.com/dalvaniza/Acesso-Privado/blob/main/_DSC0076%20(1).png") center/cover no-repeat;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  position: relative;
}

/* live dot */
.live-dot {
  position: absolute;
  top: 12px;
  left: 12px;
  background: red;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  box-shadow: 0 0 10px red;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* button */
.button {
  display: inline-block;
  width: 100%;
  padding: 18px;
  background: linear-gradient(90deg, #ff007a, #ff3c3c);
  color: white;
  text-decoration: none;
  font-size: 20px;
  border-radius: 12px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(255,0,122,0.3);
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.04);
}

.small {
  margin-top: 12px;
  font-size: 12px;
  color: #888;
}

/* viewers */
.viewers {
  margin: 10px 0 20px;
  font-size: 13px;
  color: #ffb3d9;
}
</style>
</head>

<body>

<div class="container">

  <div class="badge">LIVE ACCESS 🔥 18+</div>

  <h1>Private Live Experience</h1>

  <div class="sub">
    Access is limited right now… not everyone gets in.
  </div>

  <div class="viewers">
    👀 18–27 users are viewing this right now
  </div>

  <div class="preview">
    <div class="live-dot"></div>
  </div>

  <a class="button" href="https://islairon.cammodels.com/" target="_blank">
    ENTER PRIVATE ROOM
  </a>

  <div class="small">
    Fast access • Private show • Limited availability
  </div>

</div>

</body>
</html>
